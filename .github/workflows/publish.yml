name: Publish to pub.dev

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Validate ref matches pubspec version
        shell: bash
        run: |
          set -euo pipefail
          VERSION="$(python3 -c "from pathlib import Path; print(next(line.split(':', 1)[1].strip() for line in Path('pubspec.yaml').read_text().splitlines() if line.startswith('version:')))")"
          EXPECTED_REF="v$VERSION"
          if [ "$GITHUB_REF_NAME" != "$EXPECTED_REF" ]; then
            echo "Ref $GITHUB_REF_NAME does not match pubspec version $VERSION"
            echo "Create or select the $EXPECTED_REF tag before publishing."
            exit 1
          fi
          git fetch --no-tags origin +refs/heads/main:refs/remotes/origin/main
          RELEASE_SHA="$(git rev-parse HEAD)"
          MAIN_SHA="$(git rev-parse origin/main)"
          if [ "$RELEASE_SHA" != "$MAIN_SHA" ]; then
            echo "Release ref $GITHUB_REF_NAME points to $RELEASE_SHA"
            echo "origin/main points to $MAIN_SHA"
            echo "Merge the release commit to main, then move/create $EXPECTED_REF on main."
            exit 1
          fi

      - name: Install package dependencies
        run: flutter pub get

      - name: Install example dependencies
        working-directory: example
        run: flutter pub get

      - name: Analyze package
        run: flutter analyze

      - name: Analyze example
        working-directory: example
        run: flutter analyze

      - name: Test package
        run: flutter test

      - name: Test example
        working-directory: example
        run: flutter test

      - name: Publish dry-run
        run: dart pub publish --dry-run

  publish:
    needs: verify
    permissions:
      contents: read
      id-token: write
    uses: dart-lang/setup-dart/.github/workflows/publish.yml@v1
    with:
      environment: pub.dev
